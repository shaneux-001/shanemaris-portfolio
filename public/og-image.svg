<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#faf7fc"/>

  <!-- Logo centered -->
  <g transform="translate(450, 210)">
    <!-- 3x3 grid at 300px scale -->
    <rect x="0" y="0" width="100" height="100" rx="36" fill="rgba(123, 94, 167, 0.30)"/>
    <rect x="110" y="0" width="100" height="100" rx="36" fill="rgba(123, 94, 167, 0.45)"/>
    <rect x="220" y="0" width="100" height="100" rx="36" fill="rgba(123, 94, 167, 0.60)"/>

    <rect x="0" y="110" width="100" height="100" rx="36" fill="rgba(123, 94, 167, 0.45)"/>
    <rect x="110" y="110" width="100" height="100" rx="36" fill="rgba(123, 94, 167, 0.60)"/>
    <rect x="220" y="110" width="100" height="100" rx="36" fill="rgba(123, 94, 167, 0.75)"/>

    <rect x="0" y="220" width="100" height="100" rx="36" fill="rgba(123, 94, 167, 0.60)"/>
    <rect x="110" y="220" width="100" height="100" rx="36" fill="rgba(123, 94, 167, 0.75)"/>
    <rect x="220" y="220" width="100" height="100" rx="36" fill="rgba(123, 94, 167, 0.90)"/>
  </g>

  <!-- Text -->
  <text x="600" y="580" font-family="Inter, sans-serif" font-size="36" font-weight="bold" fill="#261a40" text-anchor="middle">Shane Maris — Design Ops & Systems Leader</text>
